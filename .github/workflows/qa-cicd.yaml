name: Enterprise DevSecOps CICD Pipeline
on: 
  push:
    branches:
      - qa
    paths:
      - client/**
      - server/**
      - .github/workflows/qa-cicd.yaml
jobs:
  gitleaks-scan:
    name: Gitleaks-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks Scan
        run : |
          docker run -v ${{ github.workspace }}:/repo zricethezav/gitleaks:latest detect --source="/repo" --report-path=/repo/gitleaks.json --redact --exit-code 0
          
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn
         
    
