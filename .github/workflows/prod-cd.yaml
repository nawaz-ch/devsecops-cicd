name: Production CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - k8-manifests/prod/app-deployment.yaml
      - .github/workflows/prod-cd.yml

permissions:
  contents: write
  id-token: write
jobs:
  promote-image-to-prod:
    name: Pull QA Latest and Retag for Prod
    runs-on: ubuntu-latest
    env:
      QA_IMAGE: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:latest
      PROD_LATEST_IMAGE: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:prod-${{ github.sha }}
    steps:
       - name: Checkout source code
         uses: actions/checkout@v4
         with:
           ref: main
         
       - name: Configure AWS Credentials
         uses: aws-actions/configure-aws-credentials@v6.1.0
         with:
           audience: sts.amazonaws.com
           aws-region: us-east-1
           role-to-assume: arn:aws:iam::339713166619:role/github-actions-oidc-role-ui3

       - name: Login to Amazon ECR
         id: login-ecr
         uses: aws-actions/amazon-ecr-login@v2
       - name: Pull QA latest image
         run: docker pull "${QA_IMAGE}"

       - name: Retag image for production
         run: |
          docker tag "${QA_IMAGE}" "${PROD_LATEST_IMAGE}"

       - name: Push prod images
         run: |
          docker push "${PROD_LATEST_IMAGE}"

          
  update-prod-manifest:
    name: Update Prod Manifest
    needs: promote-image-to-prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in prod manifest
        run: |
          sed -i "s|image: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:.*|image: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:prod-${GITHUB_SHA}|g" k8-manifests/prod/NodeJS-App-QA-Yaml-Manifests/app-deployment.yaml

      - name: Show updated manifest
        run: cat k8-manifests/prod/app-deployment.yaml

      - name: Commit and push updated prod manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8-manifests/prod/NodeJS-App-QA-Yaml-Manifests/app-deployment.yaml
          git commit -m "Update prod image to prod-${GITHUB_SHA} [skip ci]" || echo "No changes to commit"
          git push origin main
  
