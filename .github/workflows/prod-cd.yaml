name: Production CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      -k8s-manifests/prod/NodeJS-App-QA-Yaml-Manifests/app-deployment.yaml
      - .github/workflows/prod-cd.yaml
  workflow_dispatch: 

permissions:
  contents: write
  id-token: write
jobs:
  promote-image-to-prod:
    name: Pull QA Latest and Retag for Prod
    runs-on: ubuntu-latest
    env:
      QA_IMAGE: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:latest
      PROD_LATEST_IMAGE: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:prod-${{ github.sha }}
    steps:
       - name: Checkout source code
         uses: actions/checkout@v4
         with:
           ref: main
         
       - name: Configure AWS Credentials
         uses: aws-actions/configure-aws-credentials@v6.1.0
         with:
           audience: sts.amazonaws.com
           aws-region: us-east-1
           role-to-assume: arn:aws:iam::339713166619:role/github-actions-oidc-role-ui3

       - name: Login to Amazon ECR
         id: login-ecr
         uses: aws-actions/amazon-ecr-login@v2
       - name: Pull QA latest image
         run: docker pull "${QA_IMAGE}"

       - name: Retag image for production
         run: |
          docker tag "${QA_IMAGE}" "${PROD_LATEST_IMAGE}"

       - name: Push prod images
         run: |
          docker push "${PROD_LATEST_IMAGE}"

          
  update-prod-manifest:
    name: Update Prod Manifest
    needs: promote-image-to-prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in prod manifest
        run: |
          sed -i "s|image: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:.*|image: 339713166619.dkr.ecr.us-east-1.amazonaws.com/my-ecr-repo:prod-${GITHUB_SHA}|g" k8s-manifests/prod/NodeJS-App-QA-Yaml-Manifests/app-deployment.yaml

      - name: Show updated manifest
        run: cat k8s-manifests/prod/NodeJS-App-QA-Yaml-Manifests/app-deployment.yaml

      - name: Commit and push updated prod manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s-manifests/prod/NodeJS-App-QA-Yaml-Manifests/app-deployment.yaml
          git commit -m "Update prod image to prod-${GITHUB_SHA} [skip ci]" || echo "No changes to commit"
          git push origin main
  deploy-to-k8s:
    name: Deploy to Production Kubernetes
    needs: update-prod-manifest
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER_NAME: retail-dev-eksdemo
      K8S_NAMESPACE: prod

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          ref: main

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_1 }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Generate kubeconfig for EKS
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"
      - name: Create EKS Access Entry
        run: |
             PRINCIPAL_ARN="arn:aws:iam::339713166619:role/GitHubActionsEKSDeployRoleProd"
             CLUSTER="retail-dev-eksdemo"
             REGION="us-east-1"
                 # Check if access entry already exists
                        if aws eks describe-access-entry \
                           --cluster-name $CLUSTER \
                          --region $REGION \
                          --principal-arn $PRINCIPAL_ARN 2>/dev/null; then
                          echo "Access entry already exists, skipping creation..."
                       else
                          echo "Creating access entry..."
                          aws eks create-access-entry \
                         --cluster-name $CLUSTER \
                        --region $REGION \
                       --principal-arn $PRINCIPAL_ARN
                      fi

 

      - name: Associate EKS Access Policy
        run: |
           aws eks associate-access-policy --cluster-name retail-dev-eksdemo --region us-east-1 --principal-arn arn:aws:iam::339713166619:role/GitHubActionsEKSDeployRoleProd --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSEditPolicy --access-scope type=namespace,namespaces=prod
          
        
      - name: Verify identity
        run: |
          aws sts get-caller-identity
          kubectl config current-context

      - name: Verify namespace access
        run: |
          kubectl get pods -n "${K8S_NAMESPACE}" || true
          kubectl get services -n "${K8S_NAMESPACE}" || true
          kubectl auth can-i create deployments -n "${K8S_NAMESPACE}"
          kubectl auth can-i create services -n "${K8S_NAMESPACE}"
          kubectl auth can-i create ingresses.networking.k8s.io -n "${K8S_NAMESPACE}"

      - name: Deploy prod manifests
        run: |
          kubectl apply -f k8s-manifests/prod/NodeJS-App-QA-Yaml-Manifests -n "${K8S_NAMESPACE}"

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/nodejs-app -n "${K8S_NAMESPACE}" --timeout=180s
  
